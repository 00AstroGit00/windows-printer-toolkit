ShortDescription: Enterprise Windows printer troubleshooting, diagnostic, and management toolkit.
Description: |-
  PrinterToolkit is a complete Windows printer management solution for IT administrators,
  helpdesk technicians, and power users. It consolidates printer inventory, IPP discovery,
  driver intelligence (Type 3/4), Android Mopria compatibility, automatic share repair,
  diagnostic bundles, and professional reporting into a single interactive PowerShell dashboard.

  Key capabilities:
  - Printer Inventory & Status — enumerate all printers with detailed status
  - IPP Discovery — Internet Printing Protocol support detection and validation
  - Driver Intelligence — Type 3 vs Type 4 detection, export, restore, INF install
  - Share Management — enable/disable sharing, set permissions, switch transports (SMB/IPP/WSD)
  - Android Printing — Mopria Print Service compatibility wizard
  - Automatic Repair — 8-step repair workflow with full backup and rollback
  - Diagnostics — 17-check network validation, firewall/registry/service snapshots
  - Reporting — professional HTML reports, JSON/CSV exports, compliance checks
  - Diagnostic Bundle — collect everything into a single ZIP archive
